  <script src="https://cdn.tiny.cloud/1/dm8genvcpcrcmxelwkcf9bartu371cztvq627omqo586ujd3/tinymce/8/tinymce.min.js" referrerpolicy="origin" crossorigin="anonymous"></script>

<body>
  <!-- Place the following <script> and <textarea> tags your HTML's <body> -->
    <script>
     tinymce.init({
  selector: 'textarea',
  toolbar: 'blocks bold italic',

  block_formats: 'Paragrafo=p; Titolo 1=h1; Titolo 2=h2',

  setup: function (editor) {

    // 👉 Quando carica contenuto (shortcode → HTML)
    editor.on('BeforeSetContent', function (e) {
      if (e.content) {
        e.content = e.content
          .replace(/\[p\]/g, '<p>')
          .replace(/\[\/p\]/g, '</p>');
      }
    });

    // 👉 Quando salvi (HTML → shortcode)
    editor.on('GetContent', function (e) {
      if (e.content) {
        e.content = e.content
          .replace(/<p>/g, '[p]')
          .replace(/<\/p>/g, '[/p]');
      }
    });

  }
});
