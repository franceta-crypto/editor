<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyMCE Shortcode [p]</title>

  <!-- TinyMCE CDN -->
  <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
</head>
<body>

<h2>Editor con Shortcode [p]</h2>

<textarea>
[p]Benvenuto in TinyMCE![/p]
</textarea>

<script>
tinymce.init({
  selector: 'textarea',
  height: 400,
  plugins: 'code',
  toolbar: 'blocks bold italic | undo redo | alignleft aligncenter alignright | code | addP',
  
  block_formats: 'Paragrafo=p; Titolo 1=h1; Titolo 2=h2',

  setup: function (editor) {

    // Pulsante custom per inserire [p][/p]
    editor.ui.registry.addButton('addP', {
      text: '[p]',
      onAction: function () {
        editor.insertContent('[p][/p]');
      }
    });

    // Quando carica contenuto: [p] -> <p>
    editor.on('BeforeSetContent', function(e) {
      if(e.content) {
        e.content = e.content
          .replace(/\[p\]/g, '<p>')
          .replace(/\[\/p\]/g, '</p>');
      }
    });

    // Quando ottieni contenuto: <p> -> [p]
    editor.on('GetContent', function(e) {
      if(e.content) {
        e.content = e.content
          .replace(/<p>/g, '[p]')
          .replace(/<\/p>/g, '[/p]');
      }
    });

  },

  // Permetti tutti gli elementi per non eliminare tag custom
  valid_elements: '*[*]'
});
</script>

</body>
</html>
